<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>图片手动切割工具</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --line: #2a3140;
      --text: #e8ecf3;
      --muted: #93a0b5;
      --accent: #5b8cff;
      --accent-2: #3dd68c;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    body { display: grid; grid-template-rows: auto 1fr; }
    header {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--panel);
    }
    header h1 { font-size: 15px; margin: 0 12px 0 0; font-weight: 650; letter-spacing: .02em; }
    .btn, button, label.btn {
      appearance: none; border: 1px solid var(--line); background: #1d2330; color: var(--text);
      border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer;
    }
    .btn:hover, button:hover, label.btn:hover { border-color: #3a4660; background: #242b3b; }
    .btn.primary { background: var(--accent); border-color: transparent; color: #fff; font-weight: 600; }
    .btn.primary:hover { filter: brightness(1.05); }
    .btn.ok { background: var(--accent-2); border-color: transparent; color: #062416; font-weight: 700; }
    .btn.danger { background: transparent; border-color: #5a2d2d; color: #ffb4b4; }
    input[type="text"], input[type="number"] {
      background: #12161f; border: 1px solid var(--line); color: var(--text);
      border-radius: 8px; padding: 8px 10px; font-size: 13px; min-width: 220px;
    }
    input[type="file"] { display: none; }
    .spacer { flex: 1; }
    .hint { color: var(--muted); font-size: 12px; }
    main { display: grid; grid-template-columns: 1fr 320px; min-height: 0; }
    .stage-wrap { min-height: 0; overflow: auto; padding: 16px; background:
      linear-gradient(45deg, #151922 25%, transparent 25%) 0 0 / 20px 20px,
      linear-gradient(-45deg, #151922 25%, transparent 25%) 0 0 / 20px 20px,
      #10141c; }
    .stage {
      position: relative; display: inline-block; line-height: 0;
      box-shadow: 0 10px 40px rgba(0,0,0,.35); background: #fff;
    }
    .stage img { display: block; max-width: none; user-select: none; -webkit-user-drag: none; }
    canvas#overlay {
      position: absolute; inset: 0; width: 100%; height: 100%;
      cursor: crosshair;
    }
    aside {
      border-left: 1px solid var(--line); background: var(--panel);
      padding: 14px; overflow: auto; display: flex; flex-direction: column; gap: 12px;
    }
    aside h2 { margin: 0; font-size: 13px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .region {
      border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: #12161f;
    }
    .region.active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(91,140,255,.35) inset; }
    .region-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; }
    .region-head strong { font-size: 13px; }
    .coords { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .coords label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--muted); }
    .coords input { min-width: 0; width: 100%; padding: 6px 8px; }
    .toolbar-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .status { font-size: 12px; color: var(--muted); min-height: 1.2em; }
    @media (max-width: 960px) {
      main { grid-template-columns: 1fr; }
      aside { border-left: none; border-top: 1px solid var(--line); max-height: 40vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>图片手动切割</h1>
    <label class="btn">选择本地图片<input id="file" type="file" accept="image/*" /></label>
    <input id="url" type="text" placeholder="或粘贴图片 URL 后点加载" />
    <button class="btn" id="loadUrl">加载 URL</button>
    <button class="btn" id="loadDefault">加载示例图</button>
    <div class="spacer"></div>
    <span class="hint">拖拽框选 / 点选区域后拖动或拖角点缩放 · Delete 删除</span>
    <button class="btn" id="addRegion">+ 加区域</button>
    <button class="btn danger" id="clearRegions">清空区域</button>
    <button class="btn primary" id="exportOne">导出当前</button>
    <button class="btn ok" id="exportAll">导出全部 PNG</button>
  </header>
  <main>
    <div class="stage-wrap">
      <div class="stage" id="stage" hidden>
        <img id="img" alt="source" />
        <canvas id="overlay"></canvas>
      </div>
      <p class="hint" id="emptyHint" style="padding:24px">先选择或加载一张图片，然后拖拽画出切割框。</p>
    </div>
    <aside>
      <h2>区域列表</h2>
      <div class="status" id="status">尚未加载图片</div>
      <div class="toolbar-row">
        <button class="btn" id="fitView">适应窗口</button>
        <button class="btn" id="zoom100">100%</button>
        <button class="btn" id="preset9">生成 3×3 网格</button>
      </div>
      <div id="list"></div>
    </aside>
  </main>

  <script>
    const COLORS = [
      '#ff4d4f', '#40a9ff', '#73d13d', '#ffa940',
      '#b37feb', '#f759ab', '#36cfc9', '#ffec3d', '#597ef7',
      '#ff85c0', '#95de64', '#ffc069'
    ];

    const state = {
      img: null,
      naturalW: 0,
      naturalH: 0,
      scale: 1,
      regions: [],
      active: -1,
      drag: null, // { type: 'create'|'move'|'resize', ... }
    };

    const els = {
      file: document.getElementById('file'),
      url: document.getElementById('url'),
      loadUrl: document.getElementById('loadUrl'),
      loadDefault: document.getElementById('loadDefault'),
      stage: document.getElementById('stage'),
      img: document.getElementById('img'),
      overlay: document.getElementById('overlay'),
      emptyHint: document.getElementById('emptyHint'),
      list: document.getElementById('list'),
      status: document.getElementById('status'),
      addRegion: document.getElementById('addRegion'),
      clearRegions: document.getElementById('clearRegions'),
      exportOne: document.getElementById('exportOne'),
      exportAll: document.getElementById('exportAll'),
      fitView: document.getElementById('fitView'),
      zoom100: document.getElementById('zoom100'),
      preset9: document.getElementById('preset9'),
    };

    const ctx = els.overlay.getContext('2d');

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

    function normRect(x0, y0, x1, y1) {
      return {
        x: Math.min(x0, x1),
        y: Math.min(y0, y1),
        w: Math.abs(x1 - x0),
        h: Math.abs(y1 - y0),
      };
    }

    function setStatus(msg) { els.status.textContent = msg; }

    function loadImageFromUrl(url) {
      return new Promise((resolve, reject) => {
        const im = new Image();
        im.crossOrigin = 'anonymous';
        im.onload = () => resolve(im);
        im.onerror = () => reject(new Error('图片加载失败（可能被跨域限制）'));
        im.src = url;
      });
    }

    async function setImage(source) {
      let im;
      if (typeof source === 'string') im = await loadImageFromUrl(source);
      else {
        im = source;
      }
      state.img = im;
      state.naturalW = im.naturalWidth;
      state.naturalH = im.naturalHeight;
      els.img.src = im.src;
      els.stage.hidden = false;
      els.emptyHint.hidden = true;
      fitView();
      setStatus(`${state.naturalW} × ${state.naturalH} · 区域 ${state.regions.length}`);
      draw();
      renderList();
    }

    function fitView() {
      if (!state.img) return;
      const wrap = document.querySelector('.stage-wrap');
      const pad = 32;
      const sw = wrap.clientWidth - pad;
      const sh = wrap.clientHeight - pad;
      const s = Math.min(sw / state.naturalW, sh / state.naturalH, 1);
      setScale(s || 1);
    }

    function setScale(s) {
      state.scale = s;
      const w = state.naturalW * s;
      const h = state.naturalH * s;
      els.img.style.width = w + 'px';
      els.img.style.height = h + 'px';
      els.overlay.width = Math.round(w);
      els.overlay.height = Math.round(h);
      draw();
    }

    function toImageXY(evt) {
      const rect = els.overlay.getBoundingClientRect();
      const x = (evt.clientX - rect.left) / state.scale;
      const y = (evt.clientY - rect.top) / state.scale;
      return {
        x: clamp(x, 0, state.naturalW),
        y: clamp(y, 0, state.naturalH),
      };
    }

    function hitTest(px, py) {
      const hs = 8 / state.scale; // handle size in image coords
      for (let i = state.regions.length - 1; i >= 0; i--) {
        const r = state.regions[i];
        const handles = [
          ['nw', r.x, r.y],
          ['ne', r.x + r.w, r.y],
          ['sw', r.x, r.y + r.h],
          ['se', r.x + r.w, r.y + r.h],
        ];
        for (const [name, hx, hy] of handles) {
          if (Math.abs(px - hx) <= hs && Math.abs(py - hy) <= hs) {
            return { index: i, type: 'resize', handle: name };
          }
        }
        if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) {
          return { index: i, type: 'move' };
        }
      }
      return null;
    }

    function draw() {
      const { overlay } = els;
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      const s = state.scale;

      state.regions.forEach((r, i) => {
        const color = COLORS[i % COLORS.length];
        const active = i === state.active;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = active ? 3 : 2;
        ctx.setLineDash(active ? [] : [6, 4]);
        ctx.strokeRect(r.x * s, r.y * s, r.w * s, r.h * s);
        ctx.fillStyle = color + '22';
        ctx.fillRect(r.x * s, r.y * s, r.w * s, r.h * s);

        // label
        ctx.setLineDash([]);
        ctx.fillStyle = color;
        ctx.font = `bold ${12}px ui-sans-serif, system-ui`;
        const label = `#${i + 1}`;
        const tw = ctx.measureText(label).width + 10;
        ctx.fillRect(r.x * s, r.y * s, tw, 18);
        ctx.fillStyle = '#111';
        ctx.fillText(label, r.x * s + 5, r.y * s + 13);

        // handles
        if (active) {
          const pts = [
            [r.x, r.y], [r.x + r.w, r.y], [r.x, r.y + r.h], [r.x + r.w, r.y + r.h],
          ];
          ctx.fillStyle = '#fff';
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          for (const [hx, hy] of pts) {
            ctx.beginPath();
            ctx.rect(hx * s - 4, hy * s - 4, 8, 8);
            ctx.fill();
            ctx.stroke();
          }
        }
        ctx.restore();
      });
    }

    function renderList() {
      els.list.innerHTML = '';
      state.regions.forEach((r, i) => {
        const color = COLORS[i % COLORS.length];
        const div = document.createElement('div');
        div.className = 'region' + (i === state.active ? ' active' : '');
        div.innerHTML = `
          <div class="region-head">
            <span class="swatch" style="background:${color}"></span>
            <strong>#${i + 1}</strong>
            <span class="hint">${Math.round(r.w)}×${Math.round(r.h)}</span>
            <div class="spacer"></div>
            <button class="btn danger" data-del="${i}">删</button>
          </div>
          <div class="coords">
            <label>x<input type="number" data-i="${i}" data-k="x" value="${Math.round(r.x)}" /></label>
            <label>y<input type="number" data-i="${i}" data-k="y" value="${Math.round(r.y)}" /></label>
            <label>w<input type="number" data-i="${i}" data-k="w" value="${Math.round(r.w)}" /></label>
            <label>h<input type="number" data-i="${i}" data-k="h" value="${Math.round(r.h)}" /></label>
          </div>
        `;
        div.addEventListener('click', (e) => {
          if (e.target.closest('button, input')) return;
          state.active = i;
          renderList();
          draw();
        });
        els.list.appendChild(div);
      });
      setStatus(state.img
        ? `${state.naturalW} × ${state.naturalH} · 区域 ${state.regions.length}`
        : '尚未加载图片');
    }

    els.list.addEventListener('input', (e) => {
      const t = e.target;
      if (!(t instanceof HTMLInputElement)) return;
      const i = +t.dataset.i;
      const k = t.dataset.k;
      if (!state.regions[i]) return;
      let v = +t.value;
      if (!Number.isFinite(v)) return;
      if (k === 'x') v = clamp(v, 0, state.naturalW - 1);
      if (k === 'y') v = clamp(v, 0, state.naturalH - 1);
      if (k === 'w') v = clamp(v, 1, state.naturalW);
      if (k === 'h') v = clamp(v, 1, state.naturalH);
      state.regions[i][k] = v;
      // keep in bounds
      const r = state.regions[i];
      if (r.x + r.w > state.naturalW) r.w = state.naturalW - r.x;
      if (r.y + r.h > state.naturalH) r.h = state.naturalH - r.y;
      draw();
    });

    els.list.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-del]');
      if (!btn) return;
      const i = +btn.dataset.del;
      state.regions.splice(i, 1);
      if (state.active === i) state.active = -1;
      else if (state.active > i) state.active -= 1;
      renderList();
      draw();
    });

    els.overlay.addEventListener('mousedown', (e) => {
      if (!state.img) return;
      const p = toImageXY(e);
      const hit = hitTest(p.x, p.y);
      if (hit) {
        state.active = hit.index;
        const r = state.regions[hit.index];
        state.drag = {
          type: hit.type,
          handle: hit.handle,
          startX: p.x,
          startY: p.y,
          orig: { ...r },
        };
      } else {
        state.active = -1;
        state.drag = {
          type: 'create',
          startX: p.x,
          startY: p.y,
        };
      }
      renderList();
      draw();
    });

    window.addEventListener('mousemove', (e) => {
      if (!state.drag || !state.img) return;
      const p = toImageXY(e);
      if (state.drag.type === 'create') {
        const rect = normRect(state.drag.startX, state.drag.startY, p.x, p.y);
        // temporary preview region
        if (state.drag.tempIndex == null) {
          state.regions.push(rect);
          state.drag.tempIndex = state.regions.length - 1;
          state.active = state.drag.tempIndex;
        } else {
          state.regions[state.drag.tempIndex] = rect;
        }
        draw();
        return;
      }
      const r = state.regions[state.active];
      const o = state.drag.orig;
      const dx = p.x - state.drag.startX;
      const dy = p.y - state.drag.startY;
      if (state.drag.type === 'move') {
        r.x = clamp(o.x + dx, 0, state.naturalW - o.w);
        r.y = clamp(o.y + dy, 0, state.naturalH - o.h);
      } else if (state.drag.type === 'resize') {
        let x0 = o.x, y0 = o.y, x1 = o.x + o.w, y1 = o.y + o.h;
        const hdl = state.drag.handle;
        if (hdl.includes('w')) x0 = clamp(o.x + dx, 0, x1 - 2);
        if (hdl.includes('e')) x1 = clamp(o.x + o.w + dx, x0 + 2, state.naturalW);
        if (hdl.includes('n')) y0 = clamp(o.y + dy, 0, y1 - 2);
        if (hdl.includes('s')) y1 = clamp(o.y + o.h + dy, y0 + 2, state.naturalH);
        Object.assign(r, normRect(x0, y0, x1, y1));
      }
      draw();
    });

    window.addEventListener('mouseup', () => {
      if (!state.drag) return;
      if (state.drag.type === 'create' && state.drag.tempIndex != null) {
        const r = state.regions[state.drag.tempIndex];
        if (!r || r.w < 4 || r.h < 4) {
          state.regions.splice(state.drag.tempIndex, 1);
          state.active = -1;
        }
      }
      state.drag = null;
      renderList();
      draw();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (state.active >= 0 && !(e.target instanceof HTMLInputElement)) {
          state.regions.splice(state.active, 1);
          state.active = -1;
          renderList();
          draw();
        }
      }
    });

    function cropRegion(r) {
      const c = document.createElement('canvas');
      c.width = Math.max(1, Math.round(r.w));
      c.height = Math.max(1, Math.round(r.h));
      const cctx = c.getContext('2d');
      cctx.drawImage(
        state.img,
        Math.round(r.x), Math.round(r.y), Math.round(r.w), Math.round(r.h),
        0, 0, c.width, c.height
      );
      return c;
    }

    function downloadCanvas(canvas, name) {
      canvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/png');
    }

    els.file.addEventListener('change', async () => {
      const f = els.file.files?.[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      try {
        await setImage(url);
      } catch (err) {
        alert(err.message || String(err));
      }
    });

    els.loadUrl.addEventListener('click', async () => {
      const url = els.url.value.trim();
      if (!url) return alert('请先粘贴图片 URL');
      try {
        await setImage(url);
      } catch (err) {
        alert(err.message + '\n提示：若跨域失败，请改用「选择本地图片」。');
      }
    });

    els.loadDefault.addEventListener('click', async () => {
      try {
        await setImage('./source.jpg');
      } catch (err) {
        alert('示例图加载失败：' + (err.message || err));
      }
    });

    els.addRegion.addEventListener('click', () => {
      if (!state.img) return alert('请先加载图片');
      const w = Math.round(state.naturalW * 0.3);
      const h = Math.round(state.naturalH * 0.2);
      state.regions.push({
        x: Math.round(state.naturalW * 0.05),
        y: Math.round(state.naturalH * 0.05 + state.regions.length * 24),
        w, h,
      });
      state.active = state.regions.length - 1;
      renderList();
      draw();
    });

    els.clearRegions.addEventListener('click', () => {
      state.regions = [];
      state.active = -1;
      renderList();
      draw();
    });

    els.preset9.addEventListener('click', () => {
      if (!state.img) return alert('请先加载图片');
      const cols = 3, rows = 3;
      const rw = state.naturalW / cols;
      const rh = state.naturalH / rows;
      state.regions = [];
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          state.regions.push({
            x: Math.round(x * rw),
            y: Math.round(y * rh),
            w: Math.round((x + 1) * rw) - Math.round(x * rw),
            h: Math.round((y + 1) * rh) - Math.round(y * rh),
          });
        }
      }
      state.active = 0;
      renderList();
      draw();
    });

    els.fitView.addEventListener('click', fitView);
    els.zoom100.addEventListener('click', () => setScale(1));

    els.exportOne.addEventListener('click', () => {
      if (!state.img) return alert('请先加载图片');
      if (state.active < 0) return alert('请先选中一个区域');
      const r = state.regions[state.active];
      downloadCanvas(cropRegion(r), `slice-${String(state.active + 1).padStart(2, '0')}.png`);
    });

    els.exportAll.addEventListener('click', async () => {
      if (!state.img) return alert('请先加载图片');
      if (!state.regions.length) return alert('请先框选区域');
      for (let i = 0; i < state.regions.length; i++) {
        const r = state.regions[i];
        if (r.w < 1 || r.h < 1) continue;
        downloadCanvas(cropRegion(r), `slice-${String(i + 1).padStart(2, '0')}.png`);
        await new Promise((r) => setTimeout(r, 120));
      }
    });

    // boot: try default source
    setImage('./source.jpg').catch(() => {
      setStatus('请选择本地图片，或粘贴 URL 加载');
    });
  </script>
</body>
</html>
